<dialog id="newsletterModal" class="newsletter-modal">
  <button type="button" class="modal-close" onclick="document.getElementById('newsletterModal').close()" aria-label="Close">&times;</button>
  <h3>Sign up to receive our newsletter</h3>
  <p>Regular, brief updates to your email. No spam, unsubscribe any time.</p>

  <form name="newsletter" method="POST" data-netlify="true" netlify-honeypot="bot-field" class="signup-form" onsubmit="return handleNewsletterSubmit(event)">
    <input type="hidden" name="form-name" value="newsletter">
    <p class="bot-field-wrap" hidden>
      <label>Don't fill this out if you're human: <input name="bot-field"></label>
    </p>

    <label for="nl-name-modal">Name</label>
    <input type="text" id="nl-name-modal" name="name" placeholder="Your name" required>

    <label for="nl-email-modal">Email</label>
    <input type="email" id="nl-email-modal" name="email" placeholder="you@email.com" required>

    <label for="nl-phone-modal">Phone <span class="optional-tag">(optional)</span></label>
    <input type="tel" id="nl-phone-modal" name="phone" placeholder="(555) 555-5555">

    <button type="submit" class="btn btn-primary">Subscribe</button>
  </form>

  <p id="newsletter-success" class="newsletter-success" hidden>Thanks — you're on the list!</p>
</dialog>

<script>
  function handleNewsletterSubmit(e) {
    e.preventDefault();
    const form = e.target;
    const data = new FormData(form);

    fetch('/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams(data).toString()
    })
    .then(() => {
      form.hidden = true;
      document.getElementById('newsletter-success').hidden = false;
    })
    .catch((error) => {
      alert('Something went wrong submitting the form. Please try again.');
      console.error(error);
    });

    return false;
  }
</script>
