<dialog id="newsletterModal" class="newsletter-modal">
  <button type="button" class="modal-close" onclick="document.getElementById('newsletterModal').close()" aria-label="Close">&times;</button>
  <h3>Follow Us</h3>
  <p>Brief, regular email newsletters to keep you informed. We will not spam you, and you can feel free to unsubscribe anytime.</p>

  <!-- EDIT: replace this form with your MailerLite embed code -->
  <form class="signup-row" action="#" method="post" onsubmit="return false;">
    <label for="nl-email-modal" style="position:absolute;left:-9999px;">Email address</label>
    <input type="email" id="nl-email-modal" placeholder="you@email.com" required>
    <button type="submit" class="btn btn-primary">Newsletter</button>
  </form>
</dialog>
